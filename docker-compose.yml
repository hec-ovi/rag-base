services:

  # ── PostgreSQL + pgvector ────────────────────────────────
  # Starts FIRST. Everything depends on it.
  postgres:
    image: paradedb/paradedb:0.23.1-pg17
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # PGDATA points to a subdir so initdb does not fight the bind-mount root.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledge}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  # ── TEI — Embedding Model ────────────────────────────────
  # Starts SECOND. Downloads model on first boot (~1-2 min).
  # API waits for this to be healthy before starting.
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    restart: unless-stopped
    command: --model-id ${EMBEDDING_MODEL:-Snowflake/snowflake-arctic-embed-l-v2.0} --auto-truncate
    ports:
      - "127.0.0.1:${EMBEDDING_PORT:-8081}:80"
    volumes:
      - ${EMBEDDING_MODELS_DIR:?Set EMBEDDING_MODELS_DIR in .env}:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 180s

  # ── TEI — Reranker Model ─────────────────────────────────
  # OPTIONAL. Only starts with: docker compose --profile rerank up -d
  # API detects its absence and degrades gracefully.
  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    restart: unless-stopped
    command: --model-id ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3} --auto-truncate
    ports:
      - "127.0.0.1:${RERANK_PORT:-8082}:80"
    volumes:
      - ${RERANKER_MODELS_DIR:?Set RERANKER_MODELS_DIR in .env}:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 180s
    profiles:
      - rerank

  # ── Reranker GPU sidecar (BGE-v2-m3) ─────────────────────
  # OPTIONAL. Same model as the CPU TEI reranker, but on the AMD Strix Halo
  # GPU via ROCm gfx1151 prerelease wheels. Picked at request time by the
  # API when SearchRequest.rerank_model == "bge-gpu". Falls back silently to
  # the default CPU reranker if this container is not running.
  # Start with: docker compose --profile rerank-bge-gpu up -d
  reranker-bge-gpu:
    build:
      context: ./reranker-rocm
      dockerfile: Dockerfile
    image: reranker-rocm:local
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      RERANK_MODEL: BAAI/bge-reranker-v2-m3
      MODEL_CACHE: /data/models
      RERANK_BATCH_SIZE: ${BGE_GPU_RERANK_BATCH_SIZE:-8}
    ports:
      - "127.0.0.1:${BGE_GPU_RERANK_PORT:-8083}:80"
    volumes:
      - ${RERANKER_MODELS_DIR:?Set RERANKER_MODELS_DIR in .env}:/data/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
    profiles:
      - rerank-bge-gpu

  # ── Reranker GPU sidecar (Qwen3-Reranker-4B) ─────────────
  # OPTIONAL. Larger, instruction-tuned LM-style reranker. Picked at request
  # time when SearchRequest.rerank_model == "qwen-4b". Falls back silently to
  # the default CPU reranker if this container is not running.
  # Start with: docker compose --profile rerank-qwen up -d
  reranker-qwen:
    build:
      context: ./reranker-rocm
      dockerfile: Dockerfile
    image: reranker-rocm:local
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      RERANK_MODEL: Qwen/Qwen3-Reranker-4B
      RERANK_REVISION: 22e683669bc0f0bd69640a1354a6d0aebcfeede5
      MODEL_CACHE: /data/models
      RERANK_BATCH_SIZE: ${QWEN_RERANK_BATCH_SIZE:-8}
    ports:
      - "127.0.0.1:${QWEN_RERANK_PORT:-8084}:80"
    volumes:
      - ${RERANKER_MODELS_DIR:?Set RERANKER_MODELS_DIR in .env}:/data/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    profiles:
      - rerank-qwen

  # ── Reranker GPU sidecar (Qwen3-Reranker-8B) ─────────────
  # OPTIONAL. The 8B sibling of the 4B reranker. Picked at request time when
  # SearchRequest.rerank_model == "qwen-8b". On a small corpus the 8B is a
  # wash vs 4B; the value shows up on harder/longer adversarial corpora. Falls
  # back silently to the default CPU reranker if this container is not running.
  # ~16 GiB VRAM at fp16. Start with: docker compose --profile rerank-qwen-8b up -d
  reranker-qwen-8b:
    build:
      context: ./reranker-rocm
      dockerfile: Dockerfile
    image: reranker-rocm:local
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      RERANK_MODEL: Qwen/Qwen3-Reranker-8B
      RERANK_REVISION: 77d193c791ed
      MODEL_CACHE: /data/models
      RERANK_BATCH_SIZE: ${QWEN_8B_RERANK_BATCH_SIZE:-4}
    ports:
      - "127.0.0.1:${QWEN_8B_RERANK_PORT:-8085}:80"
    volumes:
      - ${RERANKER_MODELS_DIR:?Set RERANKER_MODELS_DIR in .env}:/data/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s
    profiles:
      - rerank-qwen-8b

  # ── Memgraph MAGE — Graph Engine ─────────────────────────
  # OPTIONAL. Only starts with: docker compose --profile graph up -d
  # API detects its absence and degrades gracefully.
  memgraph:
    image: memgraph/memgraph-mage:3.9.0
    restart: unless-stopped
    command: --memory-limit=1024
    ports:
      - "127.0.0.1:${MEMGRAPH_PORT:-7687}:7687"
    volumes:
      - ./data/memgraph:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    profiles:
      - graph

  # ── API — Orchestrator ───────────────────────────────────
  # Starts LAST, after postgres + embedding are healthy.
  # Connects to reranker/memgraph if available, works without them.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-5050}:8000"
    environment:
      # Postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-knowledge}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-knowledge}
      # TEI endpoints (internal Docker network, not host ports)
      EMBEDDING_URL: http://embedding:80
      RERANKER_URL: http://reranker:80
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      # Optional GPU reranker sidecars (additive; default unchanged when unset)
      BGE_GPU_RERANKER_URL: ${BGE_GPU_RERANKER_URL:-}
      QWEN_RERANKER_URL: ${QWEN_RERANKER_URL:-}
      QWEN_8B_RERANKER_URL: ${QWEN_8B_RERANKER_URL:-}
      # Memgraph
      MEMGRAPH_URL: bolt://memgraph:7687
      MEMGRAPH_ENABLED: ${MEMGRAPH_ENABLED:-true}
      # Search tuning
      HNSW_EF_SEARCH: ${HNSW_EF_SEARCH:-100}
      DEFAULT_SEARCH_TOP_K: ${DEFAULT_SEARCH_TOP_K:-20}
      DEFAULT_RERANK_CANDIDATES: ${DEFAULT_RERANK_CANDIDATES:-50}
      DEFAULT_MIN_SCORE: ${DEFAULT_MIN_SCORE:-0.40}
      # Chunking
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      # Server
      API_WORKERS: ${API_WORKERS:-1}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      # LLM (reached via host gateway; vLLM running on host)
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000}
      LLM_MODEL: ${LLM_MODEL:-Qwen3.6-27B-AWQ4}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLE_THINKING: ${LLM_ENABLE_THINKING:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # LightRAG KV store + nano-vectordb files. Bind-mounted (per the
      # no-named-volumes rule) so container rebuilds do not silently wipe
      # the source_id <-> full_doc_id mapping that bridges Memgraph entity
      # nodes back to our documents/chunks.
      - ./data/lightrag:/app/lightrag_data
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
